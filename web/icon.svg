<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="96" cy="96" r="90" fill="#2196F3" stroke="#1976D2" stroke-width="2"/>
  
  <!-- Calculator body -->
  <rect x="48" y="40" width="96" height="112" rx="8" fill="white" stroke="#1976D2" stroke-width="2"/>
  
  <!-- Display screen -->
  <rect x="56" y="48" width="80" height="32" rx="4" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5"/>
  <text x="96" y="72" font-size="20" font-weight="bold" fill="#1976D2" text-anchor="middle">$$$</text>
  
  <!-- Calculator buttons grid -->
  <rect x="56" y="88" width="16" height="16" rx="2" fill="#2196F3" stroke="#1976D2" stroke-width="1"/>
  <rect x="76" y="88" width="16" height="16" rx="2" fill="#2196F3" stroke="#1976D2" stroke-width="1"/>
  <rect x="96" y="88" width="16" height="16" rx="2" fill="#2196F3" stroke="#1976D2" stroke-width="1"/>
  <rect x="116" y="88" width="16" height="16" rx="2" fill="#FF9800" stroke="#1976D2" stroke-width="1"/>
  
  <rect x="56" y="110" width="16" height="16" rx="2" fill="#2196F3" stroke="#1976D2" stroke-width="1"/>
  <rect x="76" y="110" width="16" height="16" rx="2" fill="#2196F3" stroke="#1976D2" stroke-width="1"/>
  <rect x="96" y="110" width="16" height="16" rx="2" fill="#2196F3" stroke="#1976D2" stroke-width="1"/>
  <rect x="116" y="110" width="16" height="16" rx="2" fill="#FF9800" stroke="#1976D2" stroke-width="1"/>
  
  <!-- Button text -->
  <circle cx="64" cy="96" r="2" fill="white"/>
  <circle cx="84" cy="96" r="2" fill="white"/>
  <circle cx="104" cy="96" r="2" fill="white"/>
  <text x="124" y="100" font-size="10" font-weight="bold" fill="white" text-anchor="middle">+</text>
  
  <circle cx="64" cy="118" r="2" fill="white"/>
  <circle cx="84" cy="118" r="2" fill="white"/>
  <circle cx="104" cy="118" r="2" fill="white"/>
  <text x="124" y="122" font-size="10" font-weight="bold" fill="white" text-anchor="middle">=</text>
  
  <!-- Dollar sign accent -->
  <g transform="translate(148, 72)">
    <path d="M 0 -6 L 0 6 M -4 -3 Q 0 -5 4 -3 Q 0 -1 -4 1 Q 0 3 4 3" stroke="#FF9800" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>